# 自动检查并更新 Cask 版本（兜底机制）
# 每天北京时间凌晨 3 点检查 version.json，作为 webhook 触发的兜底
# 主要更新方式：通过发布流程的 webhook 实时触发（见 webhook-update.yml）
# 更新逻辑（格式校验 / CDN 实测 sha256 / ruby 语法检查）与 webhook 共用 scripts/update-cask.sh

name: Auto Update Cask (Fallback)

on:
  schedule:
    # 每天北京时间凌晨 3 点（UTC 19:00）作为兜底检测
    - cron: '0 19 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch version.json and compare
        id: check
        run: |
          VERSION_JSON=$(curl -fsSL "https://cdn.42plugin.com/42cc/version.json")

          REMOTE_VERSION=$(echo "$VERSION_JSON" | jq -er '.version')
          REMOTE_SHA256=$(echo "$VERSION_JSON" | jq -er '.macos.sha256')

          CURRENT_VERSION=$(grep '^  version "' Casks/42cc.rb | sed 's/.*"\(.*\)".*/\1/')
          CURRENT_SHA256=$(grep '^  sha256 "' Casks/42cc.rb | sed 's/.*"\(.*\)".*/\1/')

          echo "Remote:  version=$REMOTE_VERSION sha256=$REMOTE_SHA256"
          echo "Current: version=$CURRENT_VERSION sha256=$CURRENT_SHA256"

          echo "remote_version=$REMOTE_VERSION" >> $GITHUB_OUTPUT
          echo "remote_sha256=$REMOTE_SHA256" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if [ "$REMOTE_VERSION" != "$CURRENT_VERSION" ] || [ "$REMOTE_SHA256" != "$CURRENT_SHA256" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Update and verify cask
        if: steps.check.outputs.needs_update == 'true'
        run: ./scripts/update-cask.sh "${{ steps.check.outputs.remote_version }}" "${{ steps.check.outputs.remote_sha256 }}"

      - name: Commit and push
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Casks/42cc.rb

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: sync 42cc to ${{ steps.check.outputs.remote_version }} (fallback check)"
          git push

      - name: Create summary
        run: |
          if [ "${{ steps.check.outputs.needs_update }}" == "true" ]; then
            echo "## Updated 42cc Cask (fallback)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **New version**: ${{ steps.check.outputs.remote_version }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Previous version**: ${{ steps.check.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
            echo "- **SHA256**: \`${{ steps.check.outputs.remote_sha256 }}\` (verified against CDN artifact)" >> $GITHUB_STEP_SUMMARY
          else
            echo "## No update needed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Version **${{ steps.check.outputs.current_version }}** and SHA256 are both up to date." >> $GITHUB_STEP_SUMMARY
          fi
