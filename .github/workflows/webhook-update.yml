name: Webhook Update Cask

on:
  repository_dispatch:
    types: [new-version]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update and verify cask
        # payload 经 env 中转，不直接内插进 shell，防注入；
        # 格式校验 / CDN 实测 sha256 / ruby 语法检查都在脚本内
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA256: ${{ github.event.client_payload.sha256 }}
        run: ./scripts/update-cask.sh "$VERSION" "$SHA256"

      - name: Commit and push
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Casks/42cc.rb

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: auto-update to $VERSION (webhook triggered)"
          git push

      - name: Summary
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA256: ${{ github.event.client_payload.sha256 }}
        run: |
          echo "## Updated 42cc Cask (webhook)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA256**: \`$SHA256\` (verified against CDN artifact)" >> $GITHUB_STEP_SUMMARY
